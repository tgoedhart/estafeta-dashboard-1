<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Fundación Estafeta</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  --primary:#4D6234; --accent:#EAB733; --accent2:#4F9A9E;
  --bg:#F5F0E4; --sidebar:#4D6234; --card:#fff;
  --text:#1a1a1a; --muted:#6B6660; --border:#DBD4CA;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* TOP */
.topbar{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo{font-weight:700;font-size:17px;color:var(--accent)}
.title{font-size:12px;color:#c8d8b8}
.spacer{flex:1}
.ts{font-size:10px;color:#6B6660}

/* FILTER BAR */
.filterbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.fg{display:flex;align-items:center;gap:6px}
.step{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px}
.fg label{font-size:11px;font-weight:600;color:var(--muted)}
.fg select{font-size:12px;padding:4px 7px;border:1px solid var(--border);border-radius:5px;min-width:140px;max-width:210px}
.total-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
.badge{background:var(--primary);color:#fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.btn-clear{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 16px;display:flex;flex-shrink:0}
.tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--primary);border-bottom-color:var(--accent)}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--sidebar);overflow-y:auto;flex-shrink:0}
.nav-btn{display:block;width:100%;text-align:left;padding:8px 13px;font-size:11px;font-weight:500;color:#b8cfa8;background:none;border:none;cursor:pointer;border-left:3px solid transparent;line-height:1.4}
.nav-btn:hover{background:rgba(255,255,255,.09);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.12);color:#fff;border-left-color:var(--accent)}
.nav-sep{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#7a9a60;padding:10px 13px 3px}

.content{flex:1;overflow-y:auto;padding:16px}

/* CARDS */
.card{background:var(--card);border-radius:8px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.ct{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.csub{font-size:11px;font-weight:600;color:var(--muted);margin:9px 0 4px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.f{margin-bottom:8px}
.fl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fv{font-size:12px;color:var(--text);line-height:1.5}
.fv.big{font-size:14px;font-weight:600;color:var(--primary)}
.fv.pre{white-space:pre-wrap}
.fv.em{color:#a09890;font-style:italic}

.tag{display:inline-block;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;margin:2px;background:#ddeef0;color:#2e6e72}
.tag.g{background:#e2ecd8;color:#3a5224}
.tag.o{background:#fdf3e0;color:#8a2c0e}
.tag.gr{background:#ede9e3;color:#5a5248}
.tag.p{background:#f4ece8;color:#7a3020}
.tag.r{background:#fce5dc;color:#A53614}

.kpi{background:var(--card);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);text-align:center}
.kn{font-size:24px;font-weight:700;color:var(--primary)}
.kl{font-size:10px;color:var(--muted);margin-top:2px}

.chart-wrap{position:relative;height:190px}

.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--bg);font-weight:600;padding:5px 8px;text-align:left;border-bottom:2px solid var(--border);color:var(--muted);font-size:10px;text-transform:uppercase}
.tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:#ede9e0}
.tbl-wrap{overflow-x:auto}

.brow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.brow:last-child{border:none;font-weight:700}
.amt{font-weight:600;color:var(--primary)}

.fr{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.fl2{font-size:10px;width:140px;text-align:right;flex-shrink:0;color:var(--text)}
.fb{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden}
.fb-inner{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:5px;font-size:10px;font-weight:700;color:#fff;min-width:20px}
.fc{font-size:10px;font-weight:700;color:var(--primary);width:24px}

.sc-wrap{margin-bottom:6px}
.sc-row{display:flex;justify-content:space-between;margin-bottom:2px}
.sc-label{font-size:11px}
.sc-val{font-size:11px;font-weight:700;color:var(--primary)}
.sc-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sc-fill{height:100%;background:var(--accent2);border-radius:3px}

.sh{margin-bottom:14px}
.sh h2{font-size:16px;font-weight:700;color:var(--primary)}
.sh .org{font-size:11px;color:var(--muted);margin-top:2px}

.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px 20px}
.loading p{margin-top:8px;font-size:12px;color:var(--muted)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty h3{font-size:14px;color:var(--text);margin-bottom:5px}
.err{background:#fdf0ec;border:1px solid #f2c4b0;border-radius:7px;padding:10px 14px;color:#A53614;font-size:12px;margin:12px 0}
.div{height:1px;background:var(--border);margin:10px 0}

.no-sel{text-align:center;padding:50px 20px}
.arr{font-size:18px;color:var(--accent);animation:bob .8s ease-in-out infinite alternate;display:block;margin-bottom:8px}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-5px)}}

/* actor block */
.actor-block{background:var(--bg);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.actor-title{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:6px}
.ca{text-align:right;white-space:nowrap;padding:5px 10px !important;min-width:90px}
.ce{color:var(--accent2) !important}
.cs{font-size:11px;color:var(--muted);max-width:220px;word-break:break-word}
.tbl tfoot td{border-top:2px solid var(--border);font-weight:700;padding:6px 8px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Fundación Estafeta</div>
  <div style="font-size:14px;font-weight:700;color:#fff;margin-left:14px;border-left:1px solid rgba(255,255,255,.3);padding-left:14px;line-height:1.2">Dashboard Lectura de Formularios<br><span style="font-size:11px;font-weight:400;opacity:.85">Convocatorias y otros Donativos</span></div>
  <div class="spacer"></div>
  <div class="ts" id="ts">—</div>
  <div style="font-size:10px;color:#c8d8b8;margin-left:12px;border-left:1px solid rgba(255,255,255,.2);padding-left:12px">Desarrollado por <b style="color:#fff">ZIGLA</b></div>
</div>

<div class="filterbar">
  <div class="fg"><span class="step">1</span><label>Año</label>
    <select id="fAnio" onchange="onFC()"><option value="">Todos los años</option></select>
  </div>
  <div class="fg"><span class="step">2</span><label>Tipo de donativo</label>
    <select id="fTipo" onchange="onFC()"><option value="">Todos</option></select>
  </div>
  <div class="fg"><span class="step">3</span><label>Organización</label>
    <select id="fOrg" onchange="onOS()"><option value="">— Seleccionar —</option></select>
  </div>
  <button class="btn-clear" onclick="onClear()">✕ Limpiar</button>
  <div class="total-wrap">
    <div class="badge" id="badge">…</div>
    <div><div style="font-size:10px;font-weight:700;color:var(--primary)">Total</div><div style="font-size:10px;color:var(--muted)">orgs</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tres" onclick="switchTab('res')">📊 Resumen Donativos</button>
  <button class="tab" id="tnc" onclick="switchTab('nc')">📄 Nota Conceptual</button>
  <button class="tab" id="tfp" onclick="switchTab('fp')">📋 Formulario Presentación</button>
  <button class="tab" id="tev" onclick="switchTab('ev')">⭐ Rúbricas de Evaluación</button>
</div>

<div class="layout">
  <nav class="sidebar"><div id="nav"></div></nav>
  <div class="content" id="content">
    <div class="loading" id="loader">
      <div class="spin"></div>
      <p id="lmsg">Conectando con Airtable…</p>
    </div>
  </div>
</div>

const AT='https://api.airtable.com/v0';

const useCowork=()=>!!(window.cowork&&window.cowork.callMcpTool);

// Normalize MCP record (cellValuesByFieldId) → REST format (fields)
function norm(r){ return r.fields?r:{id:r.id,fields:r.cellValuesByFieldId||{}}; }

async function fetchAll(tbl,fids){
  if(useCowork()) return fetchAllMcp(tbl,fids);
  const recs=[];let offset=null;
  const fp=fids&&fids.length?'&'+fids.map(f=>'fields[]='+f).join('&'):'';
  for(let i=0;i<50;i++){
    const url=`${AT}/${BASE}/${tbl}?returnFieldsByFieldId=true&pageSize=100${fp}${offset?'&offset='+offset:''}`;
    const r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
    const d=await r.json();
    if(d.records) recs.push(...d.records);
    offset=d.offset||null;
    if(!offset) break;
  }
  return recs;
}
async function fetchAllMcp(tbl,fids){
  const recs=[];let cur=null;
  for(let i=0;i<20;i++){
    const a={baseId:BASE,tableId:tbl,pageSize:100};
    if(fids&&fids.length) a.fieldIds=fids;
    if(cur) a.cursor=cur;
    let res;
    try{ res=await window.cowork.callMcpTool(MCP_TOOL,a); }catch(e){ break; }
    let d;
    try{
      if(res&&res.structuredContent&&res.structuredContent.records) d=res.structuredContent;
      else{ const t=Array.isArray(res.content)?res.content[0].text:res.content; d=JSON.parse(t); }
    }catch(e){ break; }
    if(d.records) d.records.forEach(r=>recs.push(norm(r)));
    cur=d.nextCursor||null;
    if(!cur) break;
  }
  return recs;
}

    try{
      const r=await fetch(`${AT}/${BASE}/${tbl}/${id}?returnFieldsByFieldId=true`,{headers:{Authorization:'Bearer '+TOKEN}});
      return r.ok?r.json():null;
    }catch(e){ return null; }
  }));
  return results.filter(Boolean);
}
async function fetchIdsMcp(tbl,ids){

}

// ─── FILTERS ──────────────────────────────────────────────
const getF=()=>{
  const a=document.getElementById('fAnio').value, t=document.getElementById('fTipo').value;
  return S.f1.filter(r=>{
    if(a&&String(r.fields[F1.ANO]||'')!==a) return false;
    if(t&&sel(r.fields[F1.TIPO])!==t) return false;
    return true;
  });
};

function buildFilters(){
  const anos=[...new Set(S.f1.map(r=>String(r.fields[F1.ANO]||'')).filter(Boolean))].sort().reverse();
  const tipos=[...new Set(S.f1.map(r=>sel(r.fields[F1.TIPO])||'').filter(Boolean))].sort();
  const sA=document.getElementById('fAnio'), sT=document.getElementById('fTipo');
  anos.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sA.appendChild(o);});
  tipos.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sT.appendChild(o);});
  rebuildOrgs();
}

function rebuildOrgs(){
  const f=getF(), sO=document.getElementById('fOrg'), prev=sO.value;
  sO.innerHTML='<option value="">— Seleccionar —</option>';
  f.map(r=>({id:r.id,name:String(r.fields[F1.NOM]||r.id)}))
   .sort((a,b)=>a.name.localeCompare(b.name,'es'))
   .forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=o.name;sO.appendChild(opt);});
  if(prev&&f.find(r=>r.id===prev)) sO.value=prev;
  else{S.id=null;S.d1=null;S.d3=null;S.r1m=[];S.r2m=[];}
  document.getElementById('badge').textContent=f.length;
}

async function loadDetail(rid){
  const recs=await fetchIds(T.F1,[rid]);
  S.d1=recs[0]||null;

  setLoading('Cargando formulario de presentación…');
  S.f3=await fetchAll(T.F3,null);
  // Match F3: use linked record field (REST → record IDs) with name fallback (MCP → names)
  const F3_LINK='fldYptuOrsGB9ybgJ';
  const orgName=S.d1?String(S.d1.fields[F1.NOM]||'').trim().toLowerCase():'';
  S.d3=S.f3.find(r=>{
    const link=r.fields[F3_LINK];
    if(link){
      const vals=Array.isArray(link)?link:[link];
      // Try record ID match (REST) then name match (MCP)
      if(vals.some(v=>String(v)===rid)) return true;
      if(orgName&&vals.some(v=>String(v).trim().toLowerCase()===orgName)) return true;
    }
    // Fallback: formula field with org name
    const osc=r.fields[F3.OSC];
    if(osc&&orgName){
      const vals2=Array.isArray(osc)?osc:[osc];
      if(vals2.some(v=>String(v).trim().toLowerCase()===orgName)) return true;
    }
    return false;
  })||null;

  // Match R1/R2 by record ID OR org name
  S.r1m=S.r1.filter(r=>{
    const o=r.fields[R1F.ORG]; if(!o) return false;
    const vals=Array.isArray(o)?o:[o];
    return vals.some(v=>{ const s=String(v).trim().toLowerCase(); return s===rid||s===orgName; });
  });
  S.r2m=S.r2.filter(r=>{
    const o=r.fields[R2F.ORG]; if(!o) return false;
    const vals=Array.isArray(o)?o:[o];
    return vals.some(v=>{ const s=String(v).trim().toLowerCase(); return s===rid||s===orgName; });
  });
}

// ─── OVERVIEW ─────────────────────────────────────────────
function rOverview(){
  const f=getF(), tot=f.length;
  const byT={};
  const CLRS_F=['#4D6234','#4F9A9E','#C8CD7F','#EAB733','#A53614','#7a9a60'];

  // ── Funnel acumulativo (lógica idéntica al tablero Power BI) ───────────────
  // Counts por DISTINCT RFC (igual que DISTINCTCOUNT en DAX)
  // Solo cuentan "Se queda en fase X" y "Ganadora" — los estados transicionales
  // "Pasa a fase X" no se incluyen (reflejan orgs en tránsito aún sin resultado)
  const rfcTot  = new Set();
  const rfcF1   = new Set(); // Filtro1="Pasa 1er filtro" AND est in [Se queda f1..f4, Ganadora]
  const rfcF2   = new Set(); // est in [Se queda f2, f3, f4, Ganadora]
  const rfcF3   = new Set(); // est in [Se queda f3, f4, Ganadora]
  const rfcF4   = new Set(); // est in [Se queda f4, Ganadora]
  const rfcGan  = new Set(); // est = Ganadora

  const SE_QUEDA_F1UP = new Set(['Se queda en fase 1','Se queda en fase 2','Se queda en fase 3','Se queda en fase 4','Ganadora']);
  const SE_QUEDA_F2UP = new Set(['Se queda en fase 2','Se queda en fase 3','Se queda en fase 4','Ganadora']);
  const SE_QUEDA_F3UP = new Set(['Se queda en fase 3','Se queda en fase 4','Ganadora']);
  const SE_QUEDA_F4UP = new Set(['Se queda en fase 4','Ganadora']);

  f.forEach(r=>{
    const rfc = String(r.fields[F1.RFC]||r.id);
    const s   = sel(r.fields[F1.EST])||'';
    const fl1 = sel(r.fields[F1.FILTRO1])||'';
    rfcTot.add(rfc);
    if(fl1==='Pasa 1er filtro' && SE_QUEDA_F1UP.has(s)) rfcF1.add(rfc);
    if(SE_QUEDA_F2UP.has(s)) rfcF2.add(rfc);
    if(SE_QUEDA_F3UP.has(s)) rfcF3.add(rfc);
    if(SE_QUEDA_F4UP.has(s)) rfcF4.add(rfc);
    if(s==='Ganadora') rfcGan.add(rfc);
    const t=sel(r.fields[F1.TIPO])||'Sin tipo';
    byT[t]=(byT[t]||0)+1;
  });
  const nTot=rfcTot.size, nF1=rfcF1.size, nF2=rfcF2.size, nF3=rfcF3.size, nF4=rfcF4.size, nGan=rfcGan.size;

  const funnelStages=[
    ['Total de registros', nTot],
    ['Pasan a la fase 1', nF1],
    ['Pasan a la fase 2', nF2],
    ['Pasan a la fase 3', nF3],
    ['Pasan a la fase 4', nF4],
    ['Ganadoras', nGan],
  ];
  const mx=Math.max(...funnelStages.map(e=>e[1]),1);
  const funnel=funnelStages.map(([s,c],i)=>
    `<div class="fr"><div class="fl2" style="font-size:11px;font-weight:600">${esc(s)}</div><div class="fb"><div class="fb-inner" style="width:${Math.round(c/mx*100)}%;background:${CLRS_F[i]}">${c}</div></div><div class="fc">${c}</div></div>`
  ).join('');

  const rows=f.slice(0,300).map(r=>{
    const nm=String(r.fields[F1.NOM]||r.id);
    const an=String(r.fields[F1.ANO]||'—');
    const ti=sel(r.fields[F1.TIPO])||'—';
    const es=r.fields[F1.EST];
    return`<tr><td>${esc(nm)}</td><td>${esc(an)}</td><td>${esc(ti)}</td><td>${stag(es)}</td></tr>`;
  }).join('');

  return`<div class="sh"><h2>Resumen de la convocatoria</h2><div class="org">${tot} organización${tot!==1?'es':''}</div></div>
    <div class="g3" style="margin-bottom:12px">
      <div class="kpi"><div class="kn">${tot}</div><div class="kl">Total registros</div></div>
      <div class="kpi"><div class="kn">${nF2}</div><div class="kl">Pasan a fase 2</div></div>
      <div class="kpi"><div class="kn">${nGan}</div><div class="kl">Ganadoras</div></div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Funnel de la convocatoria</div>${funnel||'<span class="fv em">Sin datos</span>'}</div>
      <div class="card"><div class="ct">Tipo de donativo</div><div class="chart-wrap"><canvas id="cvt"></canvas></div></div>
    </div>
    <div class="card"><div class="ct">Organizaciones (${tot})</div><div class="tbl-wrap">
      <table class="tbl"><thead><tr><th>Organización</th><th>Año</th><th>Tipo donativo</th><th>Estatus</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`;
}
function initChart(){
  const f=getF(),byT={};
  f.forEach(r=>{const t=sel(r.fields[F1.TIPO])||'Sin tipo';byT[t]=(byT[t]||0)+1;});
  const cv=document.getElementById('cvt');
  if(!cv)return;
  const CLRS=['#4D6234','#4F9A9E','#EAB733','#A53614','#C8CD7F','#7a9a60','#9E6B2A'];

// ─── POPULATION TABLE HELPER ─────────────────────────────────────────────────
function pobTable(label,rowDefs,fTotal){
  const rows=rowDefs.map(([l,ft,fh,fm])=>{
    const t=f3v(ft),h=fh?f3v(fh):null,m=fm?f3v(fm):null;
    // Row total: always compute from H+M when available; fallback to stored total
    const tot=(h!=null||m!=null)?(h||0)+(m||0):(t!=null?t:null);
    return{l,tot,h,m};
  });
  const hasData=rows.some(r=>r.tot!=null||r.h!=null||r.m!=null);
  if(!hasData)return`<div class="card" style="margin-bottom:10px"><div class="ct">${label}</div><div class="fv em">Sin desglose registrado</div></div>`;
  // Column totals: always computed from rows
  const sumH=rows.some(r=>r.h!=null)?rows.reduce((s,r)=>r.h!=null?s+r.h:s,0):null;
  const sumM=rows.some(r=>r.m!=null)?rows.reduce((s,r)=>r.m!=null?s+r.m:s,0):null;
  const sumT=rows.some(r=>r.tot!=null)?rows.reduce((s,r)=>r.tot!=null?s+r.tot:s,0):null;
  // Grand total: computed from column sums; Airtable field only as last resort
  const grandTot=sumT!=null?sumT:(sumH!=null||sumM!=null?(sumH||0)+(sumM||0):(fTotal&&f3v(fTotal)!=null?f3v(fTotal):null));
  const rHtml=rows.filter(r=>r.tot!=null||r.h!=null||r.m!=null).map(({l,tot,h,m})=>
    `<tr><td>${l}</td><td style="text-align:right">${h!=null?n2s(h):'—'}</td><td style="text-align:right">${m!=null?n2s(m):'—'}</td><td style="text-align:right;font-weight:600">${tot!=null?n2s(tot):'—'}</td></tr>`
  ).join('');
  return`<div class="card" style="margin-bottom:10px"><div class="ct">${label}</div><div class="tbl-wrap"><table class="tbl" style="width:100%">
    <thead><tr><th>Grupo etario</th><th style="text-align:right">Hombres</th><th style="text-align:right">Mujeres</th><th style="text-align:right">Total</th></tr></thead>
    <tbody>${rHtml}</tbody>
    <tfoot><tr style="font-weight:700"><td>Total</td><td style="text-align:right">${sumH!=null?n2s(sumH):'—'}</td><td style="text-align:right">${sumM!=null?n2s(sumM):'—'}</td><td style="text-align:right">${grandTot!=null?n2s(grandTot):'—'}</td></tr></tfoot>
  </table></div></div>`;
}

function r27(){
  if(!S.d3)return noF3('VIII. Financiamiento y costos');

  // Helper: normalize field value to number
  const fn=f=>{const v=f3v(f);if(v==null)return null;if(typeof v==='number')return v;const n=parseFloat(String(v).replace(/[^0-9.-]/g,''));return isNaN(n)?null:n;};

  // cRow: table row with 4 columns [Concepto | Total | A cargo FE | Especificaciones]
  const cRow=(label,ftot,fest,fspec)=>{
    const t=fn(ftot),e=fn(fest),s=f3v(fspec);
    if(t==null&&e==null&&!s) return '';
    return`<tr>
      <td>${esc(label)}</td>
      <td class="ca">${t!=null?cur2s(t):'—'}</td>
      <td class="ca ce">${e!=null?cur2s(e):'—'}</td>
      <td class="cs">${s?esc(String(s)):''}</td>
    </tr>`;
  };

  // costCard: always renders section; computes column totals from items
  const costCard=(title,items,fTotT,fTotE)=>{
    const rows=items.map(([l,ft,fe,fs])=>cRow(l,ft,fe,fs)).join('');
    const compT=items.reduce((s,[,ft])=>{const v=fn(ft);return v!=null?s+v:s},0);
    const compE=items.reduce((s,[,,fe])=>{const v=fn(fe);return v!=null?s+v:s},0);
    const hasT=items.some(([,ft])=>fn(ft)!=null);
    const hasE=items.some(([,,fe])=>fn(fe)!=null);
    const tT=hasT?compT:(fn(fTotT)!=null?fn(fTotT):null);
    const tE=hasE?compE:(fn(fTotE)!=null?fn(fTotE):null);
    return`<div class="card"><div class="ct">${title}</div>
      <div class="tbl-wrap"><table class="tbl">
        <thead><tr><th>Concepto</th><th class="ca">Total</th><th class="ca ce">A cargo FE</th><th>Especificaciones</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="4" style="color:var(--muted);font-style:italic;padding:10px 8px">Sin datos registrados</td></tr>'}</tbody>
        <tfoot><tr><td><strong>Total ${title}</strong></td><td class="ca"><strong>${tT!=null?cur2s(tT):'—'}</strong></td><td class="ca ce"><strong>${tE!=null?cur2s(tE):'—'}</strong></td><td></td></tr></tfoot>
      </table></div></div>`;
  };

  // Items: [label, ftot, fest, fspec]
  const admItems=[
    ['Salarios personal administrativo',F3.SAL_ADM,F3.SAL_ADM_E,F3.SAL_ADM_S],
    ['Prestaciones a trabajadores',F3.PRES_ADM,F3.PRES_ADM_E,F3.PRES_ADM_S],

    ...(f3v(F3.PROP_ADM2_N)?[[String(f3v(F3.PROP_ADM2_N)),F3.PROP_ADM2,F3.PROP_ADM2_E,F3.PROP_ADM2_S]]:[]),
    ...(f3v(F3.PROP_ADM3_N)?[[String(f3v(F3.PROP_ADM3_N)),F3.PROP_ADM3,F3.PROP_ADM3_E,F3.PROP_ADM3_S]]:[]),

  const tot_t=(admT||0)+(opT||0)+(finT||0);

  const donBlock=(num,fnom,fdt,fda,fdmon,fdc,fotro)=>{

  };

  return`${hdr('VIII. Financiamiento y costos')}

function rGastos(){
  if(!S.d3)return noF3('III. Presupuesto y fuentes');
  const gap=f3v(F3.GAP),gop=f3v(F3.GOP),gaa=f3v(F3.GAA),goa=f3v(F3.GOA);
  const gtp_r=f3v(F3.GTP),gta_r=f3v(F3.GTA);
  const gtp=gtp_r!=null?gtp_r:(gap!=null||gop!=null?(gap||0)+(gop||0):null);
  const gta=gta_r!=null?gta_r:(gaa!=null||goa!=null?(gaa||0)+(goa||0):null);

  function donCard(n,fnom,fmon,fesp,fpct){
    const nom=f3v(fnom); if(!nom) return '';
    return`<div class="card"><div class="ct">Donante ${n}</div>
      ${fdBig('Nombre',nom)}
      <div class="g2">
        ${fd('Monto recibido',cur2s(f3v(fmon)))}
        ${fd('Valor en especie',cur2s(f3v(fesp)))}
      </div>
      ${f3v(fpct)!=null?fd('% del presupuesto total',n2s(f3v(fpct))+'%'):''}
    </div>`;
  }

  const ftes=multi(f3v(F3.FTES));
  const cualfte=f3v(F3.CUAL_FTE);
  const ALL_PCTS=[
    [F3.PCT_OSC_NAC,'% OSC Nacional'],[F3.PCT_OSC_INT,'% OSC Internacional'],
    [F3.PCT_MULTI,'% Organismo multilateral'],[F3.PCT_GOB,'% Gobierno'],
    [F3.PCT_PROP,'% Recursos propios'],[F3.PCT_INT_REN,'% Intereses y rendimientos'],
    [F3.PCT_DONREC,'% Donativos recurrentes'],[F3.PCT_EMP,'% Empresa / actor privado'],
    [F3.PCT_OTRA,'% Otra fuente'],
  ];
  const ftePcts=ALL_PCTS.filter(([f])=>f3v(f)!=null)
    .map(([f,l])=>`<div class="brow"><span>${l}</span><span class="amt">${n2s(f3v(f))}%</span></div>`);

  return`${hdr('III. Presupuesto y fuentes de financiamiento')}
    <div class="g2">
      <div class="card"><div class="ct">Gasto año anterior</div>
        <div class="brow"><span>Total</span><span class="amt">${cur2s(gtp)||'—'}</span></div>
        <div class="brow"><span>Administrativo</span><span class="amt">${cur2s(gap)||'—'}</span></div>
        <div class="brow"><span>Operativo</span><span class="amt">${cur2s(gop)||'—'}</span></div>
      </div>
      <div class="card"><div class="ct">Gasto año actual</div>
        <div class="brow"><span>Total</span><span class="amt">${cur2s(gta)||'—'}</span></div>
        <div class="brow"><span>Administrativo</span><span class="amt">${cur2s(gaa)||'—'}</span></div>
        <div class="brow"><span>Operativo</span><span class="amt">${cur2s(goa)||'—'}</span></div>
      </div>
    </div>
    <div class="card"><div class="ct">Fuentes de financiamiento</div>
      <div style="margin-bottom:${ftePcts.length?'12px':'0'}">${tgs(ftes)||'<span class="fv em">—</span>'}</div>
      ${ftePcts.join('')}
      ${cualfte?`<div class="brow"><span>Otra fuente (detalle)</span><span>${esc(cualfte)}</span></div>`:''}
    </div>
    <div style="margin:18px 0 10px;font-weight:600;color:var(--primary)">Principales donantes</div>
    ${donCard(1,F3.DON1,F3.MON1,F3.ESP1,F3.PDON1)}
    ${donCard(2,F3.DON2,F3.MON2,F3.ESP2,F3.PDON2)}
    ${donCard(3,F3.DON3,F3.MON3,F3.ESP3,F3.PDON3)}`;
}

function rPobAll(){
  if(!S.d3)return noF3('II. Población objetivo');
  // Project population table
  const ages=[
    ['0 – 6',  F3.PROY_T06,  F3.PROY_H06,  F3.PROY_M06],
    ['7 – 15', F3.PROY_T715, F3.PROY_H715, F3.PROY_M715],
    ['16 – 23',F3.PROY_T1623,F3.PROY_H1623,F3.PROY_M1623],
    ['24 – 40',F3.PROY_T2440,F3.PROY_H2440,F3.PROY_M2440],
    ['41 – 60',F3.PROY_T4160,F3.PROY_H4160,F3.PROY_M4160],
    ['+60',    F3.PROY_T60P, F3.PROY_H60P, F3.PROY_M60P],
  ];
  // Compute total población del proyecto from age rows when PPROY is empty
  const pproy_stored=f3v(F3.PPROY);
  const pproy_comp=(()=>{
    let s=0,any=false;
    ages.forEach(([,ft,fh,fm])=>{
      const h=f3v(fh),m=f3v(fm),t=f3v(ft);
      const row=(h!=null||m!=null)?(h||0)+(m||0):(t!=null?t:null);
      if(row!=null){s+=row;any=true;}
    });
    return any?s:null;
  })();
  const pproy_display=pproy_stored!=null?pproy_stored:(pproy_comp!=null?pproy_comp:null);
  // Population tables use pobTable helper
  const histRows=[['0 – 6',F3.HIST_T06,F3.HIST_H06,F3.HIST_M06],['7 – 15',F3.HIST_T715,F3.HIST_H715,F3.HIST_M715],['16 – 23',F3.HIST_T1623,F3.HIST_H1623,F3.HIST_M1623],['24 – 40',F3.HIST_T2440,F3.HIST_H2440,F3.HIST_M2440],['41 – 60',F3.HIST_T4160,F3.HIST_H4160,F3.HIST_M4160],['+60',F3.HIST_T60P,F3.HIST_H60P,F3.HIST_M60P]];
  const actlRows=[['0 – 6',F3.ACTL_T06,F3.ACTL_H06,F3.ACTL_M06],['7 – 15',F3.ACTL_T715,F3.ACTL_H715,F3.ACTL_M715],['16 – 23',F3.ACTL_T1623,F3.ACTL_H1623,F3.ACTL_M1623],['24 – 40',F3.ACTL_T2440,F3.ACTL_H2440,F3.ACTL_M2440],['41 – 60',F3.ACTL_T4160,F3.ACTL_H4160,F3.ACTL_M4160],['+60',F3.ACTL_T60P,F3.ACTL_H60P,F3.ACTL_M60P]];
  return`${hdr('II. Población objetivo')}
    <div class="card"><div class="ct">Descripción – Población del proyecto</div>
      <div class="csub">Población objetivo directa</div><div class="fv pre" style="margin-bottom:10px">${esc(f3v(F3.POBDIR)||'—')}</div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Características</div>
        ${fd('Género',sel(f3v(F3.GEN)))}
        <div class="f"><div class="fl">Características prioritarias</div><div>${tgs(multi(f3v(F3.CARACT)))||'<span class="fv em">—</span>'}</div></div>
        <div class="f"><div class="fl">Grupo etario</div><div>${tgs(multi(f3v(F3.ETAR)))||'<span class="fv em">—</span>'}</div></div>
        <div class="f"><div class="fl">Tipo de localidad</div><div>${tgs(multi(f3v(F3.LOC)))||'<span class="fv em">—</span>'}</div></div>
      </div>
      <div class="card"><div class="ct">Impacto</div>
        ${fd('Total población del proyecto',pproy_display!=null?n2s(pproy_display):null)}
        ${fd('Beneficiados indirectos',n2s(f3v(F3.INDIR)))}
      </div>
    </div>
    ${pobTable('Desglose por grupo etario – proyecto',ages,F3.PPROY)}
    <div class="card"><div class="ct">Criterios de selección de la PO</div>
      ${fd('Criterios',sel(f3v(F3.CRIT)))}
      ${f3v(F3.CRIT_TXT)?`<div class="fl" style="margin-top:6px">Descripción</div><div class="fv pre">${esc(f3v(F3.CRIT_TXT))}</div>`:''}
    </div>
    `;
}

    </div>`;
}
