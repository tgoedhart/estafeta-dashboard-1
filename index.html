<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Fundación Estafeta</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
<style>
:root {
  --primary:#1a3a5c; --accent:#e8a020; --accent2:#38a169;
  --bg:#f0f4f8; --sidebar:#1a3a5c; --card:#fff;
  --text:#1a202c; --muted:#718096; --border:#e2e8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

/* TOP */
.topbar{background:var(--primary);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.logo{font-weight:700;font-size:17px;color:var(--accent)}
.title{font-size:12px;color:#a0aec0}
.spacer{flex:1}
.ts{font-size:10px;color:#718096}

/* FILTER BAR */
.filterbar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;flex-shrink:0}
.fg{display:flex;align-items:center;gap:6px}
.step{background:var(--accent);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:9px}
.fg label{font-size:11px;font-weight:600;color:var(--muted)}
.fg select{font-size:12px;padding:4px 7px;border:1px solid var(--border);border-radius:5px;min-width:140px;max-width:210px}
.total-wrap{display:flex;align-items:center;gap:7px;margin-left:auto}
.badge{background:var(--primary);color:#fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.btn-clear{font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer}

/* TABS */
.tabs{background:#fff;border-bottom:2px solid var(--border);padding:0 16px;display:flex;flex-shrink:0}
.tab{padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--muted);border-bottom:3px solid transparent;margin-bottom:-2px}
.tab.active{color:var(--primary);border-bottom-color:var(--accent)}

/* LAYOUT */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--sidebar);overflow-y:auto;flex-shrink:0}
.nav-btn{display:block;width:100%;text-align:left;padding:8px 13px;font-size:11px;font-weight:500;color:#a0aec0;background:none;border:none;cursor:pointer;border-left:3px solid transparent;line-height:1.4}
.nav-btn:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-btn.active{background:rgba(255,255,255,.1);color:#fff;border-left-color:var(--accent)}
.nav-sep{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#4a5568;padding:10px 13px 3px}

.content{flex:1;overflow-y:auto;padding:16px}

/* CARDS */
.card{background:var(--card);border-radius:8px;padding:15px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.ct{font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px}
.csub{font-size:11px;font-weight:600;color:var(--muted);margin:9px 0 4px}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

.f{margin-bottom:8px}
.fl{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.fv{font-size:12px;color:var(--text);line-height:1.5}
.fv.big{font-size:14px;font-weight:600;color:var(--primary)}
.fv.pre{white-space:pre-wrap}
.fv.em{color:#a0aec0;font-style:italic}

.tag{display:inline-block;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:600;margin:2px;background:#ebf8ff;color:#2b6cb0}
.tag.g{background:#f0fff4;color:#276749}
.tag.o{background:#fffaf0;color:#c05621}
.tag.gr{background:#f7fafc;color:#4a5568}
.tag.p{background:#faf5ff;color:#553c9a}
.tag.r{background:#fff5f5;color:#9b2c2c}

.kpi{background:var(--card);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);text-align:center}
.kn{font-size:24px;font-weight:700;color:var(--primary)}
.kl{font-size:10px;color:var(--muted);margin-top:2px}

.chart-wrap{position:relative;height:190px}

.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--bg);font-weight:600;padding:5px 8px;text-align:left;border-bottom:2px solid var(--border);color:var(--muted);font-size:10px;text-transform:uppercase}
.tbl td{padding:5px 8px;border-bottom:1px solid var(--border)}
.tbl tr:hover td{background:#f7fafc}
.tbl-wrap{overflow-x:auto}

.brow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.brow:last-child{border:none;font-weight:700}
.amt{font-weight:600;color:var(--primary)}

.fr{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.fl2{font-size:10px;width:140px;text-align:right;flex-shrink:0;color:var(--text)}
.fb{flex:1;height:18px;background:var(--bg);border-radius:3px;overflow:hidden}
.fb-inner{height:100%;border-radius:3px;display:flex;align-items:center;padding-left:5px;font-size:10px;font-weight:700;color:#fff;min-width:20px}
.fc{font-size:10px;font-weight:700;color:var(--primary);width:24px}

.sc-wrap{margin-bottom:6px}
.sc-row{display:flex;justify-content:space-between;margin-bottom:2px}
.sc-label{font-size:11px}
.sc-val{font-size:11px;font-weight:700;color:var(--primary)}
.sc-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.sc-fill{height:100%;background:var(--accent2);border-radius:3px}

.sh{margin-bottom:14px}
.sh h2{font-size:16px;font-weight:700;color:var(--primary)}
.sh .org{font-size:11px;color:var(--muted);margin-top:2px}

.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:40px 20px}
.loading p{margin-top:8px;font-size:12px;color:var(--muted)}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty h3{font-size:14px;color:var(--text);margin-bottom:5px}
.err{background:#fff5f5;border:1px solid #fed7d7;border-radius:7px;padding:10px 14px;color:#c53030;font-size:12px;margin:12px 0}
.div{height:1px;background:var(--border);margin:10px 0}

.no-sel{text-align:center;padding:50px 20px}
.arr{font-size:18px;color:var(--accent);animation:bob .8s ease-in-out infinite alternate;display:block;margin-bottom:8px}
@keyframes bob{from{transform:translateY(0)}to{transform:translateY(-5px)}}

/* actor block */
.actor-block{background:var(--bg);border-radius:6px;padding:10px 12px;margin-bottom:8px}
.actor-title{font-size:11px;font-weight:700;color:var(--primary);margin-bottom:6px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ZIGLA</div>
  <div class="title">Dashboard · Convocatoria Fundación Estafeta</div>
  <div class="spacer"></div>
  <div class="ts" id="ts">—</div>
</div>

<div class="filterbar">
  <div class="fg"><span class="step">1</span><label>Año</label>
    <select id="fAnio" onchange="onFC()"><option value="">Todos los años</option></select>
  </div>
  <div class="fg"><span class="step">2</span><label>Tipo de donativo</label>
    <select id="fTipo" onchange="onFC()"><option value="">Todos</option></select>
  </div>
  <div class="fg"><span class="step">3</span><label>Organización</label>
    <select id="fOrg" onchange="onOS()"><option value="">— Seleccionar —</option></select>
  </div>
  <button class="btn-clear" onclick="onClear()">✕ Limpiar</button>
  <div class="total-wrap">
    <div class="badge" id="badge">…</div>
    <div><div style="font-size:10px;font-weight:700;color:var(--primary)">Total</div><div style="font-size:10px;color:var(--muted)">orgs</div></div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="tnc" onclick="switchTab('nc')">📄 Nota Conceptual</button>
  <button class="tab" id="tfp" onclick="switchTab('fp')">📋 Formulario Presentación</button>
</div>

<div class="layout">
  <nav class="sidebar"><div id="nav"></div></nav>
  <div class="content" id="content">
    <div class="loading" id="loader">
      <div class="spin"></div>
      <p id="lmsg">Conectando con Airtable…</p>
    </div>
  </div>
</div>

const AT='https://api.airtable.com/v0';
async function atGet(url){
  const r=await fetch(url,{headers:{Authorization:'Bearer '+TOKEN}});
  if(!r.ok) throw new Error('AT '+r.status+' '+url);
  return r.json();
}
async function fetchAll(tbl,fids){
  const recs=[];let offset=null;
  const fp=fids&&fids.length?'&'+fids.map(f=>'fields[]='+f).join('&'):'';
  for(let i=0;i<50;i++){
    const url=`${AT}/${BASE}/${tbl}?returnFieldsByFieldId=true&pageSize=100${fp}${offset?'&offset='+offset:''}`;
    const d=await atGet(url);
    if(d.records) recs.push(...d.records);
    offset=d.offset||null;
    if(!offset) break;
  }
  return recs;
}
async function fetchIds(tbl,ids){
  const results=await Promise.all(ids.map(async id=>{
    try{ return await atGet(`${AT}/${BASE}/${tbl}/${id}?returnFieldsByFieldId=true`); }
    catch(e){ return null; }
  }));
  return results.filter(Boolean);
}

const lk=v=>!v?null:(Array.isArray(v)?v.length?String(v[0]):null:(v.valuesByLinkedRecordId?Object.values(v.valuesByLinkedRecordId).flat().map(String)[0]||null:String(v)));

// ─── FILTERS ──────────────────────────────────────────────
const getF=()=>{
  const a=document.getElementById('fAnio').value, t=document.getElementById('fTipo').value;
  return S.f1.filter(r=>{
    if(a&&String(r.fields[F1.ANO]||'')!==a) return false;
    if(t&&sel(r.fields[F1.TIPO])!==t) return false;
    return true;
  });
};

function buildFilters(){
  const anos=[...new Set(S.f1.map(r=>String(r.fields[F1.ANO]||'')).filter(Boolean))].sort().reverse();
  const tipos=[...new Set(S.f1.map(r=>sel(r.fields[F1.TIPO])||'').filter(Boolean))].sort();
  const sA=document.getElementById('fAnio'), sT=document.getElementById('fTipo');
  anos.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;sA.appendChild(o);});
  tipos.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sT.appendChild(o);});
  rebuildOrgs();
}

function rebuildOrgs(){
  const f=getF(), sO=document.getElementById('fOrg'), prev=sO.value;
  sO.innerHTML='<option value="">— Seleccionar —</option>';
  f.map(r=>({id:r.id,name:String(r.fields[F1.NOM]||r.id)}))
   .sort((a,b)=>a.name.localeCompare(b.name,'es'))
   .forEach(o=>{const opt=document.createElement('option');opt.value=o.id;opt.textContent=o.name;sO.appendChild(opt);});
  if(prev&&f.find(r=>r.id===prev)) sO.value=prev;
  else{S.id=null;S.d1=null;S.d3=null;S.r1m=[];S.r2m=[];}
  document.getElementById('badge').textContent=f.length;
}

async function loadDetail(rid){
  const recs=await fetchIds(T.F1,[rid]);
  S.d1=recs[0]||null;

  setLoading('Cargando formulario de presentación…');
  S.f3=await fetchAll(T.F3,null);
  // Match F3 by record ID OR org name (REST API may return either)
  const orgName=S.d1?String(S.d1.fields[F1.NOM]||'').trim().toLowerCase():'';
  S.d3=S.f3.find(r=>{
    const osc=r.fields[F3.OSC];
    if(!osc) return false;
    const vals=Array.isArray(osc)?osc:[osc];
    return vals.some(v=>{ const s=String(v).trim().toLowerCase(); return s===rid||s===orgName; });
  })||null;

  // Match R1/R2 by record ID OR org name
  S.r1m=S.r1.filter(r=>{
    const o=r.fields[R1F.ORG]; if(!o) return false;
    const vals=Array.isArray(o)?o:[o];
    return vals.some(v=>{ const s=String(v).trim().toLowerCase(); return s===rid||s===orgName; });
  });
  S.r2m=S.r2.filter(r=>{
    const o=r.fields[R2F.ORG]; if(!o) return false;
    const vals=Array.isArray(o)?o:[o];
    return vals.some(v=>{ const s=String(v).trim().toLowerCase(); return s===rid||s===orgName; });
  });
}

function rOverview(){
  const f=getF(), tot=f.length;
  const byS={},byT={};
  const CLRS=['#1a3a5c','#2a5282','#e8a020','#38a169','#805ad5','#e53e3e','#dd6b20','#0987a0'];
  f.forEach(r=>{
    const s=sel(r.fields[F1.EST])||'Sin estatus';
    const t=sel(r.fields[F1.TIPO])||'Sin tipo';
    byS[s]=(byS[s]||0)+1; byT[t]=(byT[t]||0)+1;
  });
  const se=Object.entries(byS).sort((a,b)=>b[1]-a[1]);
  const mx=Math.max(...se.map(e=>e[1]),1);
  const funnel=se.map(([s,c],i)=>`<div class="fr"><div class="fl2">${esc(s)}</div><div class="fb"><div class="fb-inner" style="width:${Math.round(c/mx*100)}%;background:${CLRS[i%CLRS.length]}">${c}</div></div><div class="fc">${c}</div></div>`).join('');

function rRubricas(){
  if(!S.d1)return noOrg('Evaluación – Rúbricas');
  const r1c=S.r1m.map(r=>{
    const ev=lkAll(r.fields[R1F.EVAL]).filter(s=>!s.startsWith('rec')).join(', ')||'Evaluador/a';
    const an=lkAll(r.fields[R1F.ANO]).filter(s=>!s.startsWith('rec')).join(', ')||'';
    const items=[
      [R1F.ALIN,'Alineación regenerativa'],[R1F.ESOC,'Enfoque social'],
      [R1F.EECO,'Enfoque económico'],[R1F.EAMB,'Enfoque ambiental'],
      [R1F.RALIN,'Resultados alineados'],[R1F.CAP,'Capacidad instalada'],
      [R1F.INFRA,'Infraestructura instalada']
    ];
    const intItems=[
      [R1F.INTDES,'Tipo intervención: Desarrollo'],[R1F.INTEMP,'Tipo intervención: Emprendimiento']
    ];
    const com=r.fields[R1F.COM];
    return`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>${esc(ev)}</b><span class="tag p">R1${an?' · '+esc(an):''}</span></div>
      <div class="g2">${items.filter(([f])=>r.fields[f]!=null).map(([f,l])=>`<div class="f"><div class="fl">${l}</div><div>${stag(r.fields[f])}</div></div>`).join('')}</div>
      ${intItems.filter(([f])=>r.fields[f]!=null).length?`<div class="div"></div><div class="fl" style="margin-bottom:5px">Tipo de intervención</div><div class="g2">${intItems.filter(([f])=>r.fields[f]!=null).map(([f,l])=>`<div class="f"><div class="fl">${l}</div><div>${stag(r.fields[f])}</div></div>`).join('')}</div>`:''}
      ${com?`<div class="div"></div><div class="fl">Comentarios</div><div class="fv pre" style="font-size:11px">${esc(com)}</div>`:''}</div>`;
  }).join('');

  const r2c=S.r2m.map(r=>{
    const ev=lkAll(r.fields[R2F.EVAL]).filter(s=>!s.startsWith('rec')).join(', ')||'Evaluador/a';
    const an=lkAll(r.fields[R2F.ANO]).filter(s=>!s.startsWith('rec')).join(', ')||'';
    const vp=f=>r.fields[f];

    const pertQ=[
      [R2F.P1,'1. Relevancia del problema social'],[R2F.P2,'2. Claridad del objetivo general'],
      [R2F.P3,'3. Coherencia de actividades'],[R2F.P4,'4. Cambio sostenible']
    ].filter(([f])=>vp(f)!=null);
    const regeQ=[
      [R2F.E1,'1. Propuesta integral (eco/soc/amb)'],[R2F.E2,'2. Restauración del entorno natural'],
      [R2F.E3,'3. Educación ambiental'],[R2F.E4,'4. Procesos de mejora continua'],
      [R2F.E5,'5. Tejido comunitario'],[R2F.E6,'6. Equidad de género'],
      [R2F.E7,'7. Sostenibilidad económica'],[R2F.E8,'8. Vinculación con mov. regenerativo']
    ].filter(([f])=>vp(f)!=null);
    const sustQ=[
      [R2F.S1,'1. Capacidades en la población'],[R2F.S2,'2. Infraestructura comunitaria'],
      [R2F.S3,'3. Alianzas para sostenibilidad'],[R2F.S4,'4. Formación de recursos locales']
    ].filter(([f])=>vp(f)!=null);
    const segQ=[
      [R2F.SEG1,'1. Indicadores FE'],[R2F.SEG2,'2. Metodología de seguimiento']
    ].filter(([f])=>vp(f)!=null);

    const secScore=(label,questions,comField,tot,avg)=>{
      if(!questions.length&&tot==null) return '';
      const qRows=questions.map(([f,l])=>`<div class="sc-wrap"><div class="sc-row"><span class="sc-label" style="font-size:10px">${esc(l)}</span><span class="sc-val">${Number(vp(f)).toFixed(0)}/10</span></div><div class="sc-bar"><div class="sc-fill" style="width:${Math.min(100,Number(vp(f))*10)}%"></div></div></div>`).join('');
      const com=vp(comField);
      return`<div style="margin-bottom:10px">
        <div class="fl" style="margin-bottom:5px">${label}${avg!=null?' — promedio: <b>'+Number(avg).toFixed(1)+'</b>':''}</div>
        ${qRows}
        ${com?`<div class="csub">Comentario</div><div class="fv pre" style="font-size:10px;margin-bottom:4px">${esc(com)}</div>`:''}
      </div>`;
    };

    return`<div class="card" style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px"><b>${esc(ev)}</b><span class="tag o">R2${an?' · '+esc(an):''}</span></div>
      ${secScore('Pertinencia',pertQ,R2F.COMP,null,null)}
      ${secScore('Enfoque regenerativo',regeQ,R2F.COME,vp(R2F.ETOT),vp(R2F.EAVG))}
      ${secScore('Sustentabilidad',sustQ,R2F.COMS,vp(R2F.STOT),vp(R2F.SAVG))}
      ${secScore('Seguimiento y evaluación',segQ,R2F.COMSEG,vp(R2F.SEGTOT),vp(R2F.SEGAVG))}
    </div>`;
  }).join('');

  return`${hdr('Evaluación – Rúbricas')}
    <div class="fl" style="margin-bottom:6px">RÚBRICA 1 (${S.r1m.length})</div>
    ${r1c||'<div class="card"><div class="fv em">Sin registros en R1</div></div>'}
    <div class="fl" style="margin:8px 0 6px">RÚBRICA 2 (${S.r2m.length})</div>
    ${r2c||'<div class="card"><div class="fv em">Sin registros en R2</div></div>'}`;
}

    ['16 – 23',F3.PROY_T1623,F3.PROY_H1623,F3.PROY_M1623],
    ['24 – 40',F3.PROY_T2440,F3.PROY_H2440,F3.PROY_M2440],
    ['41 – 60',F3.PROY_T4160,F3.PROY_H4160,F3.PROY_M4160],
    ['+60',    F3.PROY_T60P, F3.PROY_H60P, F3.PROY_M60P],
  ];
  const hasProy=ages.some(([,ft,fh,fm])=>f3v(ft)!=null||f3v(fh)!=null||f3v(fm)!=null);
  const proyRows=ages.map(([l,ft,fh,fm])=>`<tr><td>${l}</td><td style="text-align:right">${n2s(f3v(ft))||'—'}</td><td style="text-align:right">${n2s(f3v(fh))||'—'}</td><td style="text-align:right">${n2s(f3v(fm))||'—'}</td></tr>`).join('');
  const proyTable=hasProy?`<div class="tbl-wrap"><table class="tbl" style="width:100%"><thead><tr><th>Grupo etario</th><th style="text-align:right">Total</th><th style="text-align:right">Hombres</th><th style="text-align:right">Mujeres</th></tr></thead><tbody>${proyRows}<tr style="font-weight:600;border-top:2px solid var(--border)"><td>Total</td><td style="text-align:right">${n2s(f3v(F3.PPROY))||'—'}</td><td style="text-align:right">—</td><td style="text-align:right">—</td></tr></tbody></table></div>`:'<div class="fv em">Sin desglose registrado</div>';
  // OSC population tables
  const oscTable=(label,rows,total)=>{
    const hasData=rows.some(([,ft,fh,fm])=>f3v(ft)!=null||f3v(fh)!=null||f3v(fm)!=null);
    const rHtml=rows.map(([l,ft,fh,fm])=>`<tr><td>${l}</td><td style="text-align:right">${n2s(f3v(ft))||'—'}</td><td style="text-align:right">${n2s(f3v(fh))||'—'}</td><td style="text-align:right">${n2s(f3v(fm))||'—'}</td></tr>`).join('');
    return`<div class="card" style="margin-bottom:10px"><div class="ct">${label}</div>
      ${hasData?`<div class="tbl-wrap"><table class="tbl" style="width:100%"><thead><tr><th>Grupo etario</th><th style="text-align:right">Total</th><th style="text-align:right">Hombres</th><th style="text-align:right">Mujeres</th></tr></thead><tbody>${rHtml}<tr style="font-weight:600;border-top:2px solid var(--border)"><td>Total</td><td style="text-align:right">${n2s(f3v(total))||'—'}</td><td style="text-align:right">—</td><td style="text-align:right">—</td></tr></tbody></table></div>`:'<div class="fv em">Sin desglose registrado</div>'}
    </div>`;
  };
  const histRows=[['0 – 6',F3.HIST_T06,F3.HIST_H06,F3.HIST_M06],['7 – 15',F3.HIST_T715,F3.HIST_H715,F3.HIST_M715],['16 – 23',F3.HIST_T1623,F3.HIST_H1623,F3.HIST_M1623],['24 – 40',F3.HIST_T2440,F3.HIST_H2440,F3.HIST_M2440],['41 – 60',F3.HIST_T4160,F3.HIST_H4160,F3.HIST_M4160],['+60',F3.HIST_T60P,F3.HIST_H60P,F3.HIST_M60P]];
  const actlRows=[['0 – 6',F3.ACTL_T06,F3.ACTL_H06,F3.ACTL_M06],['7 – 15',F3.ACTL_T715,F3.ACTL_H715,F3.ACTL_M715],['16 – 23',F3.ACTL_T1623,F3.ACTL_H1623,F3.ACTL_M1623],['24 – 40',F3.ACTL_T2440,F3.ACTL_H2440,F3.ACTL_M2440],['41 – 60',F3.ACTL_T4160,F3.ACTL_H4160,F3.ACTL_M4160],['+60',F3.ACTL_T60P,F3.ACTL_H60P,F3.ACTL_M60P]];
  return`${hdr('II. Población objetivo')}
    <div class="card"><div class="ct">Descripción – Población del proyecto</div>
      <div class="csub">Población objetivo directa</div><div class="fv pre" style="margin-bottom:10px">${esc(f3v(F3.POBDIR)||'—')}</div>
    </div>
    <div class="g2">
      <div class="card"><div class="ct">Características</div>
        ${fd('Género',sel(f3v(F3.GEN)))}
        <div class="f"><div class="fl">Características prioritarias</div><div>${tgs(multi(f3v(F3.CARACT)))||'<span class="fv em">—</span>'}</div></div>
        <div class="f"><div class="fl">Grupo etario</div><div>${tgs(multi(f3v(F3.ETAR)))||'<span class="fv em">—</span>'}</div></div>
        <div class="f"><div class="fl">Tipo de localidad</div><div>${tgs(multi(f3v(F3.LOC)))||'<span class="fv em">—</span>'}</div></div>
      </div>
      <div class="card"><div class="ct">Volumen</div>
        ${fd('Total población del proyecto',n2s(f3v(F3.PPROY)))}
        ${fd('Beneficiados indirectos',n2s(f3v(F3.INDIR)))}
      </div>
    </div>
    <div class="card"><div class="ct">Desglose por grupo etario – proyecto</div><div class="tbl-wrap">${proyTable}</div></div>
    <div class="card"><div class="ct">Criterios de selección de la PO</div>
      ${fd('Criterios',sel(f3v(F3.CRIT)))}
      ${f3v(F3.CRIT_TXT)?`<div class="fl" style="margin-top:6px">Descripción</div><div class="fv pre">${esc(f3v(F3.CRIT_TXT))}</div>`:''}
    </div>
    <div class="fl" style="margin:12px 0 4px;font-size:10px;letter-spacing:.5px">POBLACIÓN DE LA ORGANIZACIÓN</div>
    ${oscTable('Población histórica (total beneficiarios históricos)',histRows,F3.PHIST)}
    ${oscTable('Población actual (beneficiarios año en curso)',actlRows,F3.PACT)}`;
}

function rObjetivosInd(){
  if(!S.d3)return noF3('III. Objetivos, actividades e indicadores');
  const body23a=r23a().replace(/<h2[^>]*>.*?<\/h2>/,'');
  const body23b=r23b().replace(/<h2[^>]*>.*?<\/h2>/,'');
  return`${hdr('III. Objetivos, actividades, resultados e indicadores')}
    <div class="fl" style="margin:8px 0 4px;font-size:10px;letter-spacing:.5px">OBJETIVOS Y ACTIVIDADES</div>
    ${body23a}
    <div class="fl" style="margin:14px 0 4px;font-size:10px;letter-spacing:.5px">INDICADORES Y METAS</div>
    ${body23b}`;
}

function rGenero(){
  if(!S.d3)return noF3('IV. Perspectiva de género');
  return`${hdr('IV. Perspectiva de género')}
    <div class="g2">
      <div class="card"><div class="ct">Perspectiva de género</div>
        ${fd('¿Incorpora perspectiva de género?',sel(f3v(F3.PGEN)))}
      </div>
      <div class="card"><div class="ct">Seguimiento de población objetivo</div>
        ${fd('¿Realiza seguimiento?',sel(f3v(F3.SEG)))}
        ${f3v(F3.CSEG)?`<div class="fl" style="margin-top:4px">¿Cómo?</div><div class="fv pre">${esc(f3v(F3.CSEG))}</div>`:''}
      </div>
    </div>`;
}

function rEval(){
  if(!S.d3)return noF3('VII. Evaluación');
  const evalComo=f3v(F3.EVAL_COMO);
  const rubricas=rRubricas().replace(/<h2[^>]*>.*?<\/h2>/,'');
  return`${hdr('VII. Evaluación')}
    ${evalComo?`<div class="card"><div class="ct">¿Cómo se evaluará el proyecto?</div><div class="fv pre">${esc(evalComo)}</div></div>`:''}
    <div class="fl" style="margin:12px 0 4px;font-size:10px;letter-spacing:.5px">RÚBRICAS DE EVALUACIÓN</div>
    ${rubricas}`;
}

// ─── START ────────────────────────────────────────────────
renderNav();
setTimeout(init, 100);
</script>
